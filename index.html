<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>Laviva</title>
  <style>
    /* KASVETLI TEK RENK PALETI: Kan Kırmızısı, Koyu Kırmızı ve Siyah */
    :root { 
      --accent: #8b0000;       /* Koyu Kırmızı */
      --accent-dark: #4a0000;  /* Kan Kırmızısı (Mat/Koyu) */
      --accent-light: #ff1a1a; /* Canlı Kan Kırmızısı */
      --accent-bubble: #5c0000; 
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:#050505; color:#b0b0b0; height:100dvh; display:flex; flex-direction:column; overflow:hidden; position:relative; }
    #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; background: #050505; }
    header,#room-select-screen,#lobby-screen,#connecting-screen,#chat-screen,#closed-screen,#admin-screen { position:relative; z-index:1; }

    /* HEADER */
    header { padding:12px 16px; background:rgba(10,2,2,0.9); backdrop-filter:blur(12px); border-bottom:1px solid rgba(139,0,0,0.3); display:flex; align-items:center; gap:10px; flex-shrink:0; }
    
    header h1 { font-size:1.3rem; font-weight:800; letter-spacing:3px; color: #8b0000; text-shadow: 0 0 8px rgba(74,0,0,0.8); animation: bloodPulse 4s ease-in-out infinite; cursor:default; user-select:none; text-transform: lowercase; }
    @keyframes bloodPulse {
      0%, 100% { color: #4a0000; text-shadow: 0 0 4px rgba(74,0,0,0.6); transform: scale(0.98); }
      50% { color: #ff0000; text-shadow: 0 0 15px rgba(255,0,0,0.8); transform: scale(1.02); }
    }
    
    #header-right { margin-left:auto; display:flex; align-items:center; gap:6px; }
    #online-count { font-size:0.8rem; color:var(--accent-light); font-weight:600; display:flex; align-items:center; gap:4px; }
    #status-dot { width:10px; height:10px; border-radius:50%; background:#4a0000; display:inline-block; transition:background 0.3s; }
    #status-dot.yellow { background:#8b0000; animation:blink 1s infinite; }
    #status-dot.red    { background:#2a0000; animation:none; }
    #status-dot.green  { background:#ff0000; animation:none; box-shadow: 0 0 6px #ff0000; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
    #online-list { font-size:0.75rem; color:#555; max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    .hbtn { background:none; border:none; color:#555; cursor:pointer; font-size:1.1rem; padding:5px; display:flex; align-items:center; border-radius:8px; transition:color 0.2s; }
    .hbtn:hover { color:var(--accent-light); }
    #back-btn { display:none; }
    #sound-btn { font-size:1rem; }
    #sound-btn.muted { color:#333; }

    /* AYARLAR PANELİ */
    #settings-panel { display:none; position:fixed; top:52px; right:12px; background:rgba(10,5,5,0.98); backdrop-filter:blur(16px); border:1px solid rgba(139,0,0,0.3); border-radius:16px; padding:14px; z-index:100; width:220px; flex-direction:column; gap:12px; }
    #settings-panel.open { display:flex; }
    .sp-label { font-size:0.7rem; color:#666; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-top:4px; }
    .anim-row { display:flex; flex-direction:column; gap:6px; }
    .anim-btn { padding:6px 12px; border-radius:8px; border:1px solid rgba(139,0,0,0.2); background:rgba(0,0,0,0.4); color:#888; font-size:0.75rem; cursor:pointer; transition:all 0.2s; text-align: left; }
    .anim-btn.active { border-color:var(--accent-light); background:rgba(74,0,0,0.4); color:#fff; box-shadow: inset 0 0 5px rgba(255,0,0,0.2); }
    .sound-toggle-row { display:flex; align-items:center; justify-content:space-between; }
    .sound-toggle-row span { font-size:0.82rem; color:#888; }
    .toggle-wrap { display:flex; gap:6px; }
    .snd-btn { padding:4px 10px; border-radius:20px; border:1px solid rgba(139,0,0,0.2); background:rgba(0,0,0,0.3); color:#666; font-size:0.75rem; cursor:pointer; transition:all 0.2s; }
    .snd-btn.active { border-color:var(--accent); background:rgba(139,0,0,0.2); color:var(--accent-light); }
    .snd-btn.off.active { border-color:#333; background:#111; color:#555; }

    /* ODA SEÇİM */
    #room-select-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:24px; }
    .room-select-card { background:rgba(12,3,3,0.85); backdrop-filter:blur(20px); border:1px solid rgba(139,0,0,0.25); border-radius:20px; padding:28px 24px; display:flex; flex-direction:column; align-items:center; gap:16px; width:100%; max-width:340px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
    .room-select-title { font-size:1.6rem; font-weight:900; letter-spacing:4px; color: var(--accent-light); text-shadow: 0 0 10px rgba(255,0,0,0.5); text-transform: lowercase; }
    .room-select-sub { font-size:0.8rem; color:#555; letter-spacing:1px; }
    #rooms-grid { display:flex; flex-direction:column; gap:8px; width:100%; }
    .room-btn { padding:14px 16px; border-radius:12px; border:1px solid rgba(139,0,0,0.2); background:rgba(5,5,5,0.9); color:#aaa; font-size:0.92rem; font-weight:600; cursor:pointer; width:100%; text-align:left; display:flex; align-items:center; gap:10px; transition:all 0.25s; }
    .room-btn:hover { border-color:var(--accent-light); background:rgba(74,0,0,0.2); transform:translateX(3px); color:#fff; }
    .room-btn .room-icon { font-size:1.15rem; filter: grayscale(1) sepia(1) hue-rotate(-50deg); }
    .room-btn .room-name { flex:1; }
    .room-btn .room-lock { font-size:0.82rem; color:#444; }
    .room-btn .room-saved { font-size:0.7rem; color:var(--accent-light); background:rgba(139,0,0,0.15); padding:2px 7px; border-radius:10px; border:1px solid rgba(255,0,0,0.25); }

    /* LOBİ */
    #lobby-screen { flex:1; display:none; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:24px; }
    .lobby-card { background:rgba(12,3,3,0.85); backdrop-filter:blur(20px); border:1px solid rgba(139,0,0,0.25); border-radius:20px; padding:32px 28px; display:flex; flex-direction:column; align-items:center; gap:14px; width:100%; max-width:320px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
    .lobby-title { font-size:1.6rem; font-weight:900; letter-spacing:4px; color: var(--accent-light); text-transform: lowercase; }
    .lobby-sub { font-size:0.8rem; color:#555; text-align:center; }
    #selected-room-name { font-size:0.9rem; color:#fff; font-weight:700; background:rgba(74,0,0,0.4); padding:5px 14px; border-radius:20px; border:1px solid rgba(139,0,0,0.4); }
    #nick-input,#room-pass-input { -webkit-appearance:none; appearance:none; padding:12px 18px; border-radius:12px; border:1px solid rgba(139,0,0,0.25); background:rgba(5,5,5,0.9); color:#fff; font-size:1rem; outline:none; width:100%; transition:border-color 0.2s; }
    #nick-input:focus,#room-pass-input:focus { border-color:var(--accent-light); }
    #join-btn { padding:13px 32px; border-radius:12px; border:none; background:linear-gradient(135deg,var(--accent),var(--accent-dark)); color:#fff; font-size:1rem; font-weight:600; cursor:pointer; width:100%; box-shadow:0 4px 20px rgba(74,0,0,0.5); transition:transform 0.1s; }
    #join-btn:active { transform:scale(0.97); }
    #lobby-error { font-size:0.82rem; color:#ff4d4d; min-height:18px; text-align:center; }

    /* BAĞLANIYOR */
    #connecting-screen { flex:1; display:none; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
    #connecting-screen p { color:#666; font-size:0.95rem; }
    .spinner { width:32px; height:32px; border:3px solid rgba(139,0,0,0.1); border-top-color:var(--accent-light); border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* CHAT & SPOTIFY PANELI */
    #chat-screen { display:none; flex:1; flex-direction:column; overflow:hidden; }
    #room-label { text-align:center; font-size:0.72rem; color:#555; padding:4px 0; background:rgba(5,2,2,0.7); flex-shrink:0; letter-spacing:1px; border-bottom: 1px solid rgba(139,0,0,0.1); }
    
    /* YENI SPOTIFY CONTAINER STYLES */
    #spotify-container { background: rgba(8,2,2,0.95); border-bottom: 1px solid rgba(139,0,0,0.25); padding: 8px 12px; display: none; flex-direction: column; gap: 6px; }
    #spotify-container.active { display: flex; }
    .spot-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: #666; }
    .spot-close { background: none; border: none; color: #8b0000; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
    #spotify-player-frame { border: none; border-radius: 8px; background: #000; filter: grayscale(0.2) sepia(0.1) hue-rotate(-50deg); }

    #messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:6px; overscroll-behavior:contain; }
    .msg { display:flex; flex-direction:column; gap:2px; max-width:80%; position:relative; animation:msgIn 0.25s ease; }
    @keyframes msgIn { from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none} }
    .msg.mine { align-self:flex-end; align-items:flex-end; }
    .msg.other { align-self:flex-start; align-items:flex-start; }
    .msg-nick { font-size:0.7rem; color:#555; padding:0 4px; margin-top:6px; }
    .msg.mine .msg-nick { color:var(--accent-light); }
    .msg-bubble { padding:9px 14px; border-radius:16px; font-size:0.93rem; line-height:1.5; word-break:break-word; }
    .msg.mine .msg-bubble { background:linear-gradient(135deg,var(--accent),var(--accent-dark)); color:#fff; border-bottom-right-radius:4px; box-shadow:0 2px 12px rgba(74,0,0,0.4); }
    .msg.other .msg-bubble { background:rgba(20,10,10,0.85); backdrop-filter:blur(8px); border:1px solid rgba(139,0,0,0.15); color:#ccc; border-bottom-left-radius:4px; }
    .msg-time { font-size:0.65rem; color:#444; padding:0 4px; }
    .delete-btn { display:none; position:absolute; top:-8px; right:-8px; background:var(--accent); border:none; color:white; border-radius:50%; width:22px; height:22px; font-size:0.7rem; cursor:pointer; align-items:center; justify-content:center; z-index:10; }
    .msg.mine.show-delete .delete-btn { display:flex; }
    .deleted-text { font-style:italic; color:#444 !important; font-size:0.85rem; }
    .system-msg { text-align:center; font-size:0.74rem; color:#444; padding:2px 10px; border-radius:10px; align-self:center; margin:3px 0; }
    
    /* INPUT ALANI */
    #input-area { padding:10px 12px; background:rgba(12,3,3,0.95); backdrop-filter:blur(12px); border-top:1px solid rgba(139,0,0,0.2); display:flex; gap:8px; align-items:center; flex-shrink:0; }
    #msg-input { flex:1; padding:11px 16px; border-radius:24px; -webkit-appearance:none; appearance:none; border:1px solid rgba(139,0,0,0.25); background:rgba(5,5,5,0.9); color:#fff; font-size:1rem; outline:none; transition:border-color 0.2s; }
    #msg-input:focus { border-color:var(--accent-light); }
    #send-btn,#mic-btn,#file-btn,#emoji-btn,#spot-share-btn { width:44px; height:44px; border-radius:50%; border:none; color:#fff; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    #send-btn { background:linear-gradient(135deg,var(--accent),var(--accent-dark)); box-shadow:0 2px 12px rgba(74,0,0,0.4); }
    #mic-btn,#file-btn,#emoji-btn,#spot-share-btn { background:rgba(20,5,5,0.6); border:1px solid rgba(139,0,0,0.2); font-size:1.2rem; color: #888; }
    #spot-share-btn:hover { color: #1DB954; border-color: rgba(29,185,84,0.4); }
    #mic-btn.recording { background:#ff0000; border-color:#ff0000; animation:blink 0.8s infinite; color:#fff; }
    
    #emoji-panel { display:none; position:fixed; bottom:70px; left:0; right:0; background:rgba(12,3,3,0.98); backdrop-filter:blur(16px); border-top:1px solid rgba(139,0,0,0.25); padding:10px; z-index:50; max-height:220px; overflow-y:auto; }
    #emoji-panel.open { display:block; }
    #emoji-panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; padding:0 4px; }
    #emoji-panel-header span { font-size:0.8rem; color:#555; }
    #emoji-close { background:none; border:none; color:#555; font-size:1.2rem; cursor:pointer; }
    #emoji-grid { display:flex; flex-wrap:wrap; gap:2px; }
    .emoji-item { font-size:1.6rem; cursor:pointer; padding:4px; border-radius:8px; line-height:1; }
    #lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:200; align-items:center; justify-content:center; }
    #lightbox.open { display:flex; }
    #lightbox img { max-width:95vw; max-height:95vh; border-radius:8px; border: 1px solid #4a0000; }
    #lightbox-close { position:fixed; top:16px; right:16px; background:none; border:none; color:#fff; font-size:2rem; cursor:pointer; z-index:201; }

    /* KAPANIŞ EKRANI */
    #closed-screen { display:none; flex:1; flex-direction:column; align-items:center; justify-content:center; padding:32px; text-align:center; gap:20px; }
    #closed-screen.active { display:flex; }
    .closed-card { background:rgba(12,3,3,0.85); backdrop-filter:blur(20px); border:1px solid rgba(139,0,0,0.25); border-radius:24px; padding:40px 32px; display:flex; flex-direction:column; align-items:center; gap:16px; max-width:320px; }
    .closed-heart { font-size:2.5rem; animation:heartbeat 3s ease-in-out infinite; filter: grayscale(1) sepia(1) hue-rotate(-50deg); }
    @keyframes heartbeat { 0%,100%{transform:scale(1); opacity: 0.4;} 50%{transform:scale(1.1); opacity: 0.9;} }
    .closed-title { font-size:2rem; font-weight:800; letter-spacing:3px; color: var(--accent-light); }
    .closed-line { width:40px; height:1px; background:rgba(139,0,0,0.3); }
    .closed-subtitle { font-size:0.88rem; color:#777; line-height:1.9; }
    .closed-date { font-size:0.75rem; color:#3a1a1a; }

    /* ADMİN */
    #admin-screen { display:none; flex:1; flex-direction:column; overflow:hidden; }
    #admin-screen.active { display:flex; }
    #admin-login { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
    #admin-panel { flex:1; display:none; flex-direction:column; overflow:hidden; }
    #admin-panel.active { display:flex; }
    .admin-card { background:rgba(12,3,3,0.9); backdrop-filter:blur(20px); border:1px solid rgba(139,0,0,0.25); border-radius:20px; padding:28px 24px; display:flex; flex-direction:column; gap:14px; width:100%; max-width:320px; }
    .admin-title { font-size:1.3rem; font-weight:800; letter-spacing:2px; color: var(--accent-light); text-align:center; }
    .admin-input { padding:11px 16px; border-radius:12px; border:1px solid rgba(139,0,0,0.25); background:rgba(5,5,5,0.9); color:#fff; font-size:0.95rem; outline:none; width:100%; }
    .admin-input:focus { border-color:var(--accent-light); }
    .admin-btn { padding:12px; border-radius:12px; border:none; background:linear-gradient(135deg,var(--accent),var(--accent-dark)); color:#fff; font-size:0.95rem; font-weight:600; cursor:pointer; width:100%; }
    #admin-login-error { font-size:0.82rem; color:#ff4d4d; text-align:center; min-height:18px; }
    #admin-panel-inner { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px; }
    .admin-section-title { font-size:0.75rem; color:#555; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    .admin-room-card { background:rgba(15,5,5,0.7); border:1px solid rgba(139,0,0,0.2); border-radius:14px; padding:14px; display:flex; flex-direction:column; gap:10px; }
    .admin-room-header { display:flex; align-items:center; gap:8px; }
    .admin-room-id { font-size:0.72rem; color:#555; background:rgba(255,255,255,0.02); padding:2px 8px; border-radius:6px; }
    .admin-room-online { font-size:0.75rem; color:var(--accent-light); margin-left:auto; }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="lightbox"><button id="lightbox-close">✕</button><img id="lightbox-img" src="" /></div>
<header>
  <h1 id="logo-title">laviva</h1>
  <div id="header-right">
    <span id="online-count" style="display:none"><span id="status-dot" class="yellow"></span><span id="online-num">0</span></span>
    <span id="online-list"></span>
    <button id="back-btn" class="hbtn" title="Geri">◀</button>
    <button id="sound-btn" class="hbtn" title="Ses">🔔</button>
    <button id="settings-btn" class="hbtn" title="Ayarlar">⚙️</button>
  </div>
</header>

<div id="settings-panel">
  <div class="sp-label">Kasvet Vibe Animasyonu</div>
  <div class="anim-row">
    <button class="anim-btn active" data-anim="bleeding">🩸 Bleeding (Kan Ağlayan)</button>
    <button class="anim-btn" data-anim="melancholy">🌫️ Melancholy (Kasvet Sisi)</button>
    <button class="anim-btn" data-anim="gloom">🌧️ Gloom (Gözyaşı Yağmuru)</button>
    <button class="anim-btn" data-anim="none">✕ Kapalı</button>
  </div>
</div>

<div id="room-select-screen">
  <div class="room-select-card">
    <div class="room-select-title">laviva</div>
    <div class="room-select-sub">bir oda seç</div>
    <div id="rooms-grid"></div>
  </div>
</div>

<div id="lobby-screen">
  <div class="lobby-card">
    <div class="lobby-title">laviva</div>
    <div id="selected-room-name">Oda</div>
    <div class="lobby-sub">nick ve oda şifresini gir</div>
    <input id="nick-input" type="text" placeholder="nick..." maxlength="30" autocomplete="off" />
    <input id="room-pass-input" type="password" placeholder="şifre..." autocomplete="off" />
    <button id="join-btn">Katıl</button>
    <div id="lobby-error"></div>
  </div>
</div>

<div id="connecting-screen"><div class="spinner"></div><p>Bağlanıyor...</p></div>

<div id="chat-screen">
  <div id="room-label"></div>
  
  <div id="spotify-container">
    <div class="spot-header">
      <span>🎵 Birlikte Dinlenen Şarkı</span>
      <button class="spot-close" id="spot-close-btn">✕ Kapat</button>
    </div>
    <iframe id="spotify-player-frame" src="" width="100%" height="80" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </div>

  <div id="messages"></div>
  <div id="typing-status"></div>
  <div id="upload-status">⏳ Yükleniyor...</div>
  
  <div id="input-area">
    <button id="file-btn">📎</button>
    <button id="mic-btn">🎤</button>
    <button id="spot-share-btn" title="Spotify'da Birlikte Dinle">🎵</button>
    <input id="msg-input" type="text" placeholder="Mesaj yaz..." maxlength="500" autocomplete="off" />
    <button id="send-btn">➤</button>
  </div>
</div>

<div id="closed-screen">
  <div class="closed-card">
    <div class="closed-heart">🖤</div>
    <div class="closed-title">laviva</div>
  </div>
</div>

<script>
const NICK_KEY    = 'laviva_nick';
const ANIM_KEY    = 'laviva_anim';
const PASS_KEY    = 'laviva_passes';

let nick           = localStorage.getItem(NICK_KEY) || '';
let ws             = null;
let selectedRoomId = null;
let currentAnim    = localStorage.getItem(ANIM_KEY) || 'bleeding';
let animFrame      = null;
let savedPasses = JSON.parse(localStorage.getItem(PASS_KEY) || '{}');

const roomSelectScreen = document.getElementById('room-select-screen');
const lobbyScreen      = document.getElementById('lobby-screen');
const connectingScreen = document.getElementById('connecting-screen');
const chatScreen       = document.getElementById('chat-screen');
const nickInput        = document.getElementById('nick-input');
const roomPassInput    = document.getElementById('room-pass-input');
const joinBtn          = document.getElementById('join-btn');
const lobbyError       = document.getElementById('lobby-error');
const selectedRoomName = document.getElementById('selected-room-name');
const messagesEl       = document.getElementById('messages');
const msgInput         = document.getElementById('msg-input');
const sendBtn          = document.getElementById('send-btn');
const spotShareBtn     = document.getElementById('spot-share-btn');
const spotifyContainer = document.getElementById('spotify-container');
const spotifyFrame     = document.getElementById('spotify-player-frame');
const spotCloseBtn     = document.getElementById('spot-close-btn');
const roomsGrid        = document.getElementById('rooms-grid');
const backBtn          = document.getElementById('back-btn');

function showScreen(name) {
  [roomSelectScreen,lobbyScreen,connectingScreen,chatScreen].forEach(s => s.style.display='none');
  backBtn.style.display='none';
  if (name==='room-select') roomSelectScreen.style.display='flex';
  else if (name==='lobby')  { lobbyScreen.style.display='flex'; backBtn.style.display='flex'; }
  else if (name==='connecting') { connectingScreen.style.display='flex'; backBtn.style.display='flex'; }
  else if (name==='chat')   { chatScreen.style.display='flex'; backBtn.style.display='flex'; }
}

backBtn.addEventListener('click', () => {
  if (ws) { ws.close(); ws=null; }
  showScreen('room-select'); loadRooms();
});

// ── FIXED CANVAS ANIMASYON DÖNGÜSÜ (Tek Tek Çalışma Garantili) ─────────────────
const canvas = document.getElementById('bg-canvas');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() { W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
resize(); window.addEventListener('resize', resize);

let activeDrops = [], activeClouds = [], activeTears = [];

function initBleeding() {
  activeDrops = Array.from({length:35}, () => ({
    x: Math.random() * W, y: Math.random() * H - H,
    len: Math.random() * 25 + 10, speed: Math.random() * 0.4 + 0.1,
    w: Math.random() * 2 + 1, alpha: Math.random() * 0.4 + 0.2
  }));
}
function drawBleeding() {
  animFrame = requestAnimationFrame(drawBleeding);
  ctx.fillStyle = 'rgba(5, 5, 5, 0.08)';
  ctx.fillRect(0,0,W,H);
  activeDrops.forEach(d => {
    ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y + d.len);
    ctx.strokeStyle = `rgba(139, 0, 0, ${d.alpha})`; ctx.lineWidth = d.w; ctx.stroke();
    d.y += d.speed;
    if (d.y > H) { d.y = -d.len; d.x = Math.random() * W; }
  });
}

function initMelancholy() {
  activeClouds = Array.from({length:15}, () => ({
    x: Math.random() * W, y: Math.random() * H, r: Math.random() * 100 + 80,
    vx: (Math.random() - 0.5) * 0.15, vy: (Math.random() - 0.5) * 0.15,
    alpha: Math.random() * 0.12 + 0.03, grow: (Math.random() - 0.5) * 0.05
  }));
}
function drawMelancholy() {
  animFrame = requestAnimationFrame(drawMelancholy);
  ctx.clearRect(0,0,W,H);
  activeClouds.forEach(c => {
    let grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
    grad.addColorStop(0, `rgba(20, 3, 3, ${c.alpha})`);
    grad.addColorStop(1, 'rgba(5, 5, 5, 0)');
    ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
    ctx.fillStyle = grad; ctx.fill();
    c.x += c.vx; c.y += c.vy; c.r += c.grow;
    if(c.r > 200 || c.r < 60) c.grow *= -1;
    if(c.x < -c.r) c.x = W + c.r; if(c.x > W + c.r) c.x = -c.r;
  });
}

function initGloom() {
  activeTears = Array.from({length:60}, () => ({
    x: Math.random() * W, y: Math.random() * H,
    length: Math.random() * 15 + 5, speed: Math.random() * 1.5 + 0.5, opacity: Math.random() * 0.25 + 0.05
  }));
}
function drawGloom() {
  animFrame = requestAnimationFrame(drawGloom);
  ctx.clearRect(0,0,W,H);
  activeTears.forEach(t => {
    ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.x, t.y + t.length);
    ctx.strokeStyle = `rgba(180, 20, 20, ${t.opacity})`; ctx.stroke();
    t.y += t.speed; if (t.y > H) { t.y = -t.length; t.x = Math.random() * W; }
  });
}

function startAnim(name) {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  ctx.clearRect(0, 0, W, H);
  if (name === 'bleeding') { initBleeding(); drawBleeding(); }
  else if (name === 'melancholy') { initMelancholy(); drawMelancholy(); }
  else if (name === 'gloom') { initGloom(); drawGloom(); }
}
startAnim(currentAnim);

document.querySelectorAll('.anim-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentAnim = btn.dataset.anim; localStorage.setItem(ANIM_KEY, currentAnim);
    document.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); startAnim(currentAnim);
  });
});

// ── MÜZİK PAYLAŞIM VE SENKRONİZASYON TETİKLEYİCİLERİ ──────────────────────────
spotShareBtn.addEventListener('click', () => {
  const url = prompt("Spotify Paylaşım Linkini Gir (Şarkı, Albüm veya Çalma Listesi):");
  if(!url) return;
  
  // Spotify URL'ini embed koduna dönüştürme regex'i
  let embedUrl = "";
  if(url.includes("spotify.com")) {
    embedUrl = url.replace("spotify.com/", "spotify.com/embed/");
    // Eğer linkte filtre/track argümanı varsa temizleyelim
    if(embedUrl.includes("?si=")) {
      embedUrl = embedUrl.split("?si=")[0];
    }
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'spotify-sync', url: embedUrl }));
    }
  } else {
    alert("Geçersiz Spotify linki!");
  }
});

spotCloseBtn.addEventListener('click', () => {
  spotifyContainer.classList.remove('active');
  spotifyFrame.src = "";
});
// ── ODALAR & CHAT BAĞLANTISI ──────────────────────────────────────────────────
async function loadRooms() {
  try {
    const res = await fetch('/rooms'); const rooms = await res.json();
    roomsGrid.innerHTML = '';
    rooms.forEach((r, i) => {
      const btn = document.createElement('button'); btn.className = 'room-btn';
      btn.innerHTML = `<span class="room-name">${r.name}</span>`;
      btn.addEventListener('click', () => { selectedRoomId = r.id; showScreen('lobby'); });
      roomsGrid.appendChild(btn);
    });
  } catch(e){}
}

function connectChat(roomId, password) {
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => { ws.send(JSON.stringify({type:'join',nick,roomId,password})); };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type==='history') showScreen('chat');
    else if (data.type==='message') {
      const div = document.createElement('div'); div.className = 'msg';
      div.innerHTML = `<span class="msg-bubble">${data.message.text}</span>`;
      messagesEl.appendChild(div);
    }
    // GERÇEK ZAMANLI SPOTIFY PAKET YAKALAYICI
    else if (data.type === 'spotify-broadcast') {
      spotifyFrame.src = data.url;
      spotifyContainer.classList.add('active');
    }
  };
}

joinBtn.addEventListener('click', () => {
  nick = nickInput.value.trim(); localStorage.setItem(NICK_KEY, nick);
  connectChat(selectedRoomId, roomPassInput.value);
});

loadRooms();
</script>
