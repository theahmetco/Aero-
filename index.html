<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>Laviva</title>
  <style>
    :root { --accent:#dc2626; --accent-dark:#991b1b; --accent-light:#f87171; }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:#040406; color:#e0e0e0; height:100dvh; display:flex; flex-direction:column; overflow:hidden; position:relative; }
    
    #bg-canvas { position:absolute; inset:0; z-index:1; pointer-events:none; }
    header, #main-container { position:relative; z-index:2; }
    #main-container { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    header { padding:12px 16px; background:rgba(12,12,18,0.85); backdrop-filter:blur(12px); border-bottom:1px solid rgba(220,38,38,0.15); display:flex; align-items:center; gap:10px; }
    header h1 { font-size:1.3rem; font-weight:800; letter-spacing:2px; background:linear-gradient(135deg,var(--accent-light),#3b82f6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; cursor:pointer; user-select:none; }
    #header-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
    #online-count { font-size:0.8rem; color:var(--accent-light); font-weight:600; }
    
    .hbtn { background:none; border:none; color:#6b7280; cursor:pointer; font-size:1.1rem; padding:5px; }
    #back-btn { display:none; }

    #settings-panel { display:none; position:fixed; top:52px; right:12px; background:rgba(12,12,18,0.98); backdrop-filter:blur(16px); border:1px solid rgba(220,38,38,0.2); border-radius:16px; padding:14px; z-index:100; width:220px; flex-direction:column; gap:12px; }
    #settings-panel.open { display:flex; }
    .sp-label { font-size:0.7rem; color:#4b5563; font-weight:700; text-transform:uppercase; }
    .theme-row { display:flex; gap:8px; }
    .theme-dot { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
    .theme-dot.active { border-color:#fff; transform:scale(1.1); }
    .anim-row { display:flex; flex-direction:column; gap:6px; }
    .anim-btn { padding:6px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.04); color:#9ca3af; font-size:0.75rem; cursor:pointer; text-align:left; }
    .anim-btn.active { border-color:var(--accent-light); background:rgba(220,38,38,0.15); color:#e0e0e0; }

    #spotify-container { background:rgba(10,10,15,0.85); border-bottom:1px solid rgba(255,255,255,0.08); padding:10px 12px; display:flex; flex-direction:column; gap:6px; position:relative; z-index:10; opacity:1 !important; visibility:visible !important; }
    .spot-bar { display:flex; gap:8px; align-items:center; }
    .spot-input { flex:1; padding:6px 12px; border-radius:18px; border:1px solid rgba(255,255,255,0.1); background:rgba(5,5,10,0.8); color:#fff; font-size:0.8rem; outline:none; }
    .spot-btn { padding:6px 12px; border-radius:18px; border:none; background:#1db954; color:#fff; font-size:0.75rem; font-weight:700; cursor:pointer; }
    #spotify-player-wrapper { display:block; height:80px; width:100%; border-radius:8px; overflow:hidden; position:relative; background:#000; }

    .screen { flex:1; display:none; flex-direction:column; align-items:center; justify-content:center; padding:24px; overflow-y:auto; }
    .card { background:rgba(15,15,22,0.8); backdrop-filter:blur(20px); border:1px solid rgba(220,38,38,0.2); border-radius:20px; padding:24px; width:100%; max-width:340px; display:flex; flex-direction:column; gap:12px; }
    
    #rooms-grid { display:flex; flex-direction:column; gap:8px; width:100%; }
    .room-btn { padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.08); background:rgba(10,10,15,0.8); color:#e0e0e0; font-weight:600; cursor:pointer; text-align:left; }
    
    input[type="text"], input[type="password"] { padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.12); background:rgba(10,10,15,0.8); color:#fff; outline:none; width:100%; }
    .primary-btn { padding:13px; border-radius:12px; border:none; background:linear-gradient(135deg,var(--accent),#1d4ed8); color:#fff; font-weight:600; cursor:pointer; }

    #chat-screen { display:none; flex:1; flex-direction:column; overflow:hidden; padding:0; justify-content:flex-start; }
    #room-label { text-align:center; font-size:0.72rem; color:#4b5563; padding:4px; background:rgba(5,5,10,0.5); width:100%; }
    #messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:6px; width:100%; }
    .msg { display:flex; flex-direction:column; max-width:80%; }
    .msg.mine { align-self:flex-end; align-items:flex-end; }
    .msg.other { align-self:flex-start; align-items:flex-start; }
    .msg-nick { font-size:0.7rem; color:#6b7280; margin-bottom:2px; }
    .msg-bubble { padding:9px 14px; border-radius:16px; font-size:0.93rem; word-break:break-word; }
    .msg.mine .msg-bubble { background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
    .msg.other .msg-bubble { background:rgba(20,20,30,0.9); border:1px solid rgba(255,255,255,0.05); color:#e0e0e0; border-bottom-left-radius:4px; }
    
    #input-area { padding:10px; background:rgba(12,12,18,0.9); display:flex; gap:8px; align-items:center; width:100%; }
    #msg-input { flex:1; padding:11px 16px; border-radius:24px; border:1px solid rgba(255,255,255,0.12); background:rgba(10,10,15,0.8); color:#fff; outline:none; }
    #send-btn { width:44px; height:44px; border-radius:50%; border:none; color:#fff; cursor:pointer; background:var(--accent); display:flex; align-items:center; justify-content:center; }

    .admin-room-card { display:flex; justify-content:between; align-items:center; background:rgba(255,255,255,0.04); padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.05); margin-bottom:6px; }
    .del-room-btn { background:#ef4444; color:white; border:none; padding:4px 8px; border-radius:6px; cursor:pointer; font-size:0.75rem; margin-left:auto;}
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<header>
  <h1 id="logo-title">laviva</h1>
  <div id="header-right">
    <span id="online-count" style="display:none">🟢 <span id="online-num">0</span></span>
    <button id="back-btn" class="hbtn">◀</button>
    <button id="settings-btn" class="hbtn">⚙️</button>
  </div>
</header>

<div id="main-container">
  <div id="spotify-container">
    <div class="spot-bar">
      <input type="text" id="spot-link" class="spot-input" placeholder="Spotify Linki (track/playlist)..." />
      <button id="spot-sync-btn" class="spot-btn">Müziği Değiştir</button>
    </div>
    <div id="spotify-player-wrapper">
      <iframe id="spotify-player" src="" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
    </div>
  </div>

  <!-- ODALAR EKRANI -->
  <div id="room-select-screen" class="screen" style="display:flex;">
    <div class="card">
      <div style="font-weight:800; text-align:center; letter-spacing:1px; color:var(--accent-light)">SOHBET ODALARI</div>
      <div id="rooms-grid"></div>
    </div>
  </div>

  <!-- LOBİ EKRANI -->
  <div id="lobby-screen" class="screen">
    <div class="card">
      <div id="selected-room-name" style="text-align:center; font-weight:700;"></div>
      <input type="text" id="nick-input" placeholder="Kullanıcı Adın" maxlength="30" />
      <input type="password" id="room-pass-input" placeholder="Oda Şifresi" />
      <button id="join-btn" class="primary-btn">Odaya Bağlan</button>
    </div>
  </div>

  <!-- BAĞLANTI EKRANI -->
  <div id="connecting-screen" class="screen">
    <div class="spinner"></div>
  </div>

  <!-- CHAT EKRANI -->
  <div id="chat-screen" class="screen">
    <div id="room-label"></div>
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="msg-input" placeholder="Mesajını yaz..." maxlength="500" />
      <button id="send-btn">➔</button>
    </div>
  </div>

  <!-- ADMIN EKRANI -->
  <div id="admin-screen" class="screen">
    <div class="card" style="max-width:400px;">
      <div style="font-weight:800; text-align:center;">LAVIVA ADMIN PANELİ</div>
      <div id="admin-login-area">
        <input type="text" id="admin-user" placeholder="Admin Kullanıcı Adı" style="margin-bottom:8px;"/>
        <input type="password" id="admin-pass" placeholder="Admin Şifre" style="margin-bottom:8px;"/>
        <button id="admin-login-btn" class="primary-btn" style="width:100%;">Giriş Yap</button>
      </div>
      <div id="admin-panel-area" style="display:none;">
        <div style="font-size:0.8rem; font-weight:700; margin-bottom:6px;">YENİ ODA EKLE</div>
        <input type="text" id="new-room-name" placeholder="Oda Adı" style="margin-bottom:6px;"/>
        <input type="text" id="new-room-pass" placeholder="Oda Şifresi" style="margin-bottom:8px;"/>
        <button id="add-room-btn" class="primary-btn" style="width:100%; padding:8px; margin-bottom:12px;">Odayı Oluştur</button>
        
        <div style="font-size:0.8rem; font-weight:700; margin-bottom:6px;">YÖNETİLEN ODALAR</div>
        <div id="admin-rooms-list"></div>
      </div>
    </div>
  </div>
</div>

<div id="settings-panel">
  <div class="sp-label">Renk Teması</div>
  <div class="theme-row">
    <div class="theme-dot active" style="background:#dc2626" data-accent="#dc2626" data-dark="#991b1b" data-light="#f87171"></div>
    <div class="theme-dot" style="background:#2563eb" data-accent="#2563eb" data-dark="#1d4ed8" data-light="#60a5fa"></div>
  </div>
  <div class="sp-label" style="margin-top:8px">Arka Plan Efekti</div>
  <div class="anim-row">
    <button class="anim-btn active" data-anim="blood">🩸 Ağlayan Kan</button>
    <button class="anim-btn" data-anim="lightning">⚡ Bölgesel Yıldırım</button>
    <button class="anim-btn" data-anim="neon">⭕ Cyber Neon Pulse</button>
    <button class="anim-btn" data-anim="none">✕ Kapalı</button>
  </div>
</div>

<script>
  const msgSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2357/2357-84.wav'); 
  const joinSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav');
  msgSound.volume = 0.5; joinSound.volume = 0.4;

  const NICK_KEY = 'laviva_nick', THEME_KEY = 'laviva_theme', ANIM_KEY = 'laviva_anim';
  let nick = localStorage.getItem(NICK_KEY) || '', ws = null, selectedRoomId = null, adminToken = '';
  let currentAnim = localStorage.getItem(ANIM_KEY) || 'blood', animFrame = null, isHistoryLoading = false;

  const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
  let W = window.innerWidth, H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  window.addEventListener('resize', () => { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; });

  // ── ANIMASYONLAR ───────────────────────────────────────────────────────────
  const bloodDrops = [];
  function animBlood() {
    animFrame = requestAnimationFrame(animBlood);
    ctx.fillStyle = 'rgba(4, 4, 6, 0.15)';
    ctx.fillRect(0, 0, W, H);
    if(bloodDrops.length < 35 && Math.random() < 0.2) {
      bloodDrops.push({ x: Math.random()*W, y: -10, len: Math.random()*15+10, speed: Math.random()*2 + 1 });
    }
    ctx.fillStyle = '#991b1b';
    for(let i=0; i<bloodDrops.length; i++) {
      let d = bloodDrops[i];
      ctx.fillRect(d.x, d.y, 2, d.len);
      d.y += d.speed;
      if(d.y > H) bloodDrops.splice(i, 1);
    }
  }

  // Bölgesel Fırtına Yıldırımı ve Temaya Duyarlı Sis Efekti
  let bolt = null;
  function animLightning() {
    animFrame = requestAnimationFrame(animLightning);
    
    // Karanlık fırtına arka planı (Bulutumsu koyu sis yapısı için alfa düşük tutuldu)
    ctx.fillStyle = 'rgba(4, 4, 6, 0.12)';
    ctx.fillRect(0, 0, W, H);

    const activeColorLight = document.documentElement.style.getPropertyValue('--accent-light').trim() || '#f87171';
    const activeColorDark = document.documentElement.style.getPropertyValue('--accent-dark').trim() || '#991b1b';

    // Yeni şimşek yaratma tetikleyicisi
    if (!bolt && Math.random() < 0.02) {
      const strikeX = Math.random() * W;
      const strikeY = Math.random() * (H * 0.4); // Ekranın üst yarısında bir merkez nokta
      bolt = {
        startX: strikeX,
        startY: strikeY,
        opacity: 1.0,
        segments: [],
        clouds: []
      };

      // Yıldırım segmentlerini oluştur
      let curX = strikeX;
      let curY = strikeY;
      while (curY < H * 0.8) {
        let nextX = curX + (Math.random() * 60 - 30);
        let nextY = curY + (Math.random() * 35 + 15);
        bolt.segments.push({ x1: curX, y1: curY, x2: nextX, y2: nextY });
        curX = nextX;
        curY = nextY;
      }

      // Yıldırım etrafına yayılacak sis bulutları tanımla
      for (let k = 0; k < 5; k++) {
        bolt.clouds.push({
          cx: strikeX + (Math.random() * 120 - 60),
          cy: strikeY + (Math.random() * 120 - 60),
          radius: Math.random() * 100 + 80
        });
      }
    }

    if (bolt) {
      // 1. Temaya duyarlı sis/bulut kümesini yıldırım alanına bas
      bolt.clouds.forEach(c => {
        let grad = ctx.createRadialGradient(c.cx, c.cy, 10, c.cx, c.cy, c.radius);
        grad.addColorStop(0, activeColorDark + '1a'); // Yarı şeffaf tema rengi sis
        grad.addColorStop(0.5, '#00000033'); // Araya giren karartı/bulut efekti
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(c.cx, c.cy, c.radius, 0, Math.PI * 2);
        ctx.fill();
      });

      // 2. Yıldırımın kendisini çiz
      ctx.strokeStyle = activeColorLight;
      ctx.lineWidth = 2.5;
      ctx.shadowColor = activeColorLight;
      ctx.shadowBlur = 15;
      ctx.globalAlpha = bolt.opacity;

      ctx.beginPath();
      bolt.segments.forEach(seg => {
        ctx.moveTo(seg.x1, seg.y1);
        ctx.lineTo(seg.x2, seg.y2);
      });
      ctx.stroke();

      // Değerleri sıfırla/temizle
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1.0;

      bolt.opacity -= 0.12;
      if (bolt.opacity <= 0) {
        bolt = null;
      }
    }
  }

  let pulseRadius = 0;
  function animNeon() {
    animFrame = requestAnimationFrame(animNeon);
    ctx.fillStyle = 'rgba(4, 4, 6, 0.08)';
    ctx.fillRect(0, 0, W, H);
    pulseRadius += 2;
    if (pulseRadius > Math.max(W, H) * 0.5) pulseRadius = 0;
    ctx.beginPath();
    ctx.arc(W/2, H/2, pulseRadius, 0, Math.PI * 2);
    const activeColor = document.documentElement.style.getPropertyValue('--accent').trim();
    let alpha = 1 - (pulseRadius / (Math.max(W, H)*0.5));
    ctx.strokeStyle = activeColor === '#2563eb' ? 'rgba(37, 99, 235, ' + alpha + ')' : 'rgba(220, 38, 38, ' + alpha + ')';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  function startAnim(name) {
    if (animFrame) cancelAnimationFrame(animFrame);
    ctx.clearRect(0,0,W,H);
    if (name==='blood') animBlood();
    else if (name==='lightning') animLightning();
    else if (name==='neon') animNeon();
  }

  // ── SPOTIFY YÖNETİMİ ────────────────────────────────────────────────────────
  document.getElementById('spot-sync-btn').addEventListener('click', () => {
    let link = document.getElementById('spot-link').value.trim();
    if (!link) return;
    if (link.includes('spotify.com/')) {
      const match = link.match(/(track|playlist|album|artist)\/([a-zA-Z0-9]+)/);
      if (match) link = 'spotify:embed:' + match[1] + ':' + match[2];
    }
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'spotify_change', uri: link }));
      document.getElementById('spot-link').value = '';
    }
  });

  function updateSpotifyEmbed(uri) {
    let embedUrl = "";
    if (uri.startsWith('spotify:embed:')) {
      const parts = uri.split(':');
      embedUrl = 'https://open.spotify.com/embed/' + parts[2] + '/' + parts[3];
    } else if (uri.includes('open.spotify.com/')) {
      embedUrl = uri;
    } else {
      embedUrl = 'https://open.spotify.com/embed/track/4PTG3Z6ehGkBFm6TuvYv2G';
    }
    const player = document.getElementById('spotify-player');
    if(player.src !== embedUrl) player.src = embedUrl;
  }

  // ── EKRAN KONTROLLERİ ───────────────────────────────────────────────────────
  const screens = ['room-select', 'lobby', 'connecting', 'chat', 'admin'];
  function showScreen(id) {
    screens.forEach(s => document.getElementById(s + '-screen').style.display = s === id ? 'flex' : 'none');
    document.getElementById('back-btn').style.display = id === 'room-select' ? 'none' : 'flex';
    document.getElementById('online-count').style.display = id === 'chat' ? 'flex' : 'none';
  }

  // Logo Tıklaması Doğrudan Admin Paneline Götürür
  document.getElementById('logo-title').addEventListener('click', () => showScreen('admin'));
  document.getElementById('settings-btn').addEventListener('click', () => document.getElementById('settings-panel').classList.toggle('open'));
  
  document.getElementById('back-btn').addEventListener('click', () => {
    if (ws) { ws.close(); ws=null; }
    showScreen('room-select');
    loadRooms();
  });

  function applyTheme(accent, dark, light) {
    document.documentElement.style.setProperty('--accent', accent);
    document.documentElement.style.setProperty('--accent-dark', dark);
    document.documentElement.style.setProperty('--accent-light', light);
    localStorage.setItem(THEME_KEY, JSON.stringify({accent,dark,light}));
  }
  document.querySelectorAll('.theme-dot').forEach(dot => dot.addEventListener('click', () => applyTheme(dot.dataset.accent,dot.dataset.dark,dot.dataset.light)));

  document.querySelectorAll('.anim-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentAnim = btn.dataset.anim;
      localStorage.setItem(ANIM_KEY, currentAnim);
      startAnim(currentAnim);
    });
  });

  // ── CHAT & REST PROCESSES ───────────────────────────────────────────────────
  const roomsGrid = document.getElementById('rooms-grid');
  const messagesEl = document.getElementById('messages');
  const msgInput = document.getElementById('msg-input');

  async function loadRooms() {
    try {
      const res = await fetch('/rooms');
      const rooms = await res.json();
      roomsGrid.innerHTML = '';
      rooms.forEach(r => {
        const btn = document.createElement('button');
        btn.className = 'room-btn';
        btn.textContent = r.name;
        btn.addEventListener('click', () => {
          selectedRoomId = r.id;
          document.getElementById('selected-room-name').textContent = r.name;
          document.getElementById('nick-input').value = nick;
          showScreen('lobby');
        });
        roomsGrid.appendChild(btn);
      });
    } catch(e){}
  }
  function connectChat(roomId, password) {
    showScreen('connecting');
    isHistoryLoading = true;
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(protocol + '//' + location.host);
    
    ws.onopen = () => { ws.send(JSON.stringify({ type: 'join', nick, roomId, password })); };
    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'error') { alert(data.text); showScreen('lobby'); }
      else if (data.type === 'history') {
        document.getElementById('room-label').textContent = document.getElementById('selected-room-name').textContent;
        showScreen('chat');
        messagesEl.innerHTML = '';
        data.messages.forEach(m => addMessage(m, m.nick === nick));
        setTimeout(() => { isHistoryLoading = false; }, 500);
      } else if (data.type === 'spotify_sync') { 
        updateSpotifyEmbed(data.uri); 
      } else if (data.type === 'message') { 
        addMessage(data.message, data.message.nick === nick);
        if(!isHistoryLoading) { msgSound.play().catch(()=>{}); }
      } else if (data.type === 'system') {
        if(!isHistoryLoading) { joinSound.play().catch(()=>{}); }
      } else if (data.type === 'online') { 
        document.getElementById('online-num').textContent = data.count; 
      }
    };
  }

  document.getElementById('join-btn').addEventListener('click', () => {
    const n = document.getElementById('nick-input').value.trim();
    const p = document.getElementById('room-pass-input').value;
    if(!n || !p) return;
    nick = n; localStorage.setItem(NICK_KEY, nick);
    connectChat(selectedRoomId, p);
  });

  function addMessage(msg, isMine) {
    const div = document.createElement('div');
    div.className = 'msg ' + (isMine?'mine':'other');
    div.innerHTML = '<span class="msg-nick">' + msg.nick + '</span><div class="msg-bubble">' + msg.text + '</div>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  document.getElementById('send-btn').addEventListener('click', () => {
    const text = msgInput.value.trim();
    if(!text || !ws) return;
    ws.send(JSON.stringify({ type: 'chat', nick, text }));
    msgInput.value = '';
  });

  // ── ADMIN PANEL AYARLARI ────────────────────────────────────────────────────
  document.getElementById('admin-login-btn').addEventListener('click', async () => {
    const username = document.getElementById('admin-user').value;
    const password = document.getElementById('admin-pass').value;
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const d = await res.json();
    if(d.ok) {
      adminToken = d.token;
      document.getElementById('admin-login-area').style.display = 'none';
      document.getElementById('admin-panel-area').style.display = 'block';
      loadAdminRooms();
    } else { alert('Hatalı Bilgi!'); }
  });

  async function loadAdminRooms() {
    const res = await fetch('/admin/rooms', { headers: { 'x-admin-token': adminToken } });
    const list = await res.json();
    const area = document.getElementById('admin-rooms-list');
    area.innerHTML = '';
    list.forEach(r => {
      const div = document.createElement('div');
      div.className = 'admin-room-card';
      div.innerHTML = `<span><b>${r.name}</b> (${r.password})</span><button class="del-room-btn" onclick="deleteRoom('${r.id}')">Sil</button>`;
      area.appendChild(div);
    });
  }

  async function deleteRoom(id) {
    if(!confirm('Odayı silmek istediğine emin misin?')) return;
    await fetch('/admin/rooms/' + id, { method: 'DELETE', headers: { 'x-admin-token': adminToken } });
    loadAdminRooms();
  }

  document.getElementById('add-room-btn').addEventListener('click', async () => {
    const name = document.getElementById('new-room-name').value.trim();
    const password = document.getElementById('new-room-pass').value;
    if(!name || !password) return;
    await fetch('/admin/rooms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
      body: JSON.stringify({ name, password })
    });
    document.getElementById('new-room-name').value = '';
    document.getElementById('new-room-pass').value = '';
    loadAdminRooms();
  });

  // BAŞLANGIÇ
  const savedTheme = localStorage.getItem(THEME_KEY);
  if (savedTheme) { const t = JSON.parse(savedTheme); applyTheme(t.accent, t.dark, t.light); }
  else { applyTheme('#dc2626', '#991b1b', '#f87171'); }
  startAnim(currentAnim);
  loadRooms();
</script>
</body>
</html>
