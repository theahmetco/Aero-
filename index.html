<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>Laviva</title>
  <style>
    :root { 
      --accent: #7c3aed; 
      --accent-dark: #6d28d9; 
      --accent-light: #a78bfa; 
      --accent-bubble: #7c3aed; 
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:#0a0a0f; color:#e0e0e0; height:100dvh; display:flex; flex-direction:column; overflow:hidden; position:relative; }
    #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
    header,#room-select-screen,#lobby-screen,#connecting-screen,#chat-screen,#closed-screen,#admin-screen { position:relative; z-index:1; }

    /* HEADER */
    header { padding:12px 16px; background:rgba(23,23,31,0.85); backdrop-filter:blur(12px); border-bottom:1px solid rgba(167,139,250,0.15); display:flex; align-items:center; gap:10px; flex-shrink:0; }
    header h1 { font-size:1.4rem; font-weight:800; letter-spacing:4px; background:linear-gradient(135deg, #fff, var(--accent-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; cursor:pointer; user-select:none; }
    
    #header-right { margin-left:auto; display:flex; align-items:center; gap:6px; }
    #online-count { font-size:0.8rem; color:var(--accent-light); font-weight:600; display:flex; align-items:center; gap:4px; }
    #status-dot { width:8px; height:8px; border-radius:50%; background:#ef4444; display:inline-block; transition:background 0.3s; }
    #status-dot.yellow { background:#f59e0b; animation:blink 1s infinite; }
    #status-dot.green { background:#10b981; box-shadow:0 0 8px var(--accent-light); }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.4} }
    #online-list { font-size:0.75rem; color:#888; max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-right:4px; }

    .hbtn { background:none; border:none; color:#888; cursor:pointer; font-size:1.1rem; padding:6px; display:flex; align-items:center; border-radius:8px; transition:all 0.2s; }
    .hbtn:hover { color:#fff; background:rgba(255,255,255,0.05); }
    #back-btn { display:none; }
    #sound-btn.muted { color:#444; }

    /* AYARLAR PANELİ */
    #settings-panel { display:none; position:fixed; top:56px; right:16px; background:rgba(20,20,27,0.95); backdrop-filter:blur(16px); border:1px solid rgba(167,139,250,0.2); border-radius:12px; padding:12px; z-index:100; width:220px; flex-direction:column; gap:10px; box-shadow:0 10px 25px rgba(0,0,0,0.5); }
    #settings-panel.open { display:flex; }
    .sp-label { font-size:0.7rem; color:#888; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
    .anim-row { display:flex; flex-direction:column; gap:4px; }
    .anim-btn { padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.02); color:#aaa; font-size:0.75rem; cursor:pointer; transition:all 0.2s; text-align:left; }
    .anim-btn:hover { background:rgba(255,255,255,0.05); color:#fff; }
    .anim-btn.active { border-color:var(--accent); background:rgba(124,58,237,0.15); color:var(--accent-light); }

    /* ODA SEÇİM */
    #room-select-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:24px; }
    .room-select-card { background:rgba(20,20,27,0.65); backdrop-filter:blur(20px); border:1px solid rgba(167,139,250,0.15); border-radius:24px; padding:32px 24px; display:flex; flex-direction:column; align-items:center; gap:16px; width:100%; max-width:360px; box-shadow:0 20px 40px rgba(0,0,0,0.4); }
    .room-select-title { font-size:1.8rem; font-weight:900; letter-spacing:6px; background:linear-gradient(135deg,#fff,var(--accent-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-transform:uppercase; }
    .room-select-sub { font-size:0.85rem; color:#888; }
    #rooms-grid { display:flex; flex-direction:column; gap:8px; width:100%; }
    .room-btn { padding:14px 16px; border-radius:14px; border:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.03); color:#e0e0e0; font-size:0.95rem; font-weight:600; cursor:pointer; width:100%; text-align:left; display:flex; align-items:center; gap:10px; transition:all 0.2s; }
    .room-btn:hover { border-color:var(--accent-light); background:rgba(124,58,237,0.1); transform:translateY(-1px); }
    .room-btn .room-name { flex:1; }
    .room-btn .room-saved { font-size:0.7rem; color:var(--accent-light); background:rgba(124,58,237,0.15); padding:2px 6px; border-radius:6px; }

    /* LOBİ */
    #lobby-screen { flex:1; display:none; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:24px; }
    .lobby-card { background:rgba(20,20,27,0.65); backdrop-filter:blur(20px); border:1px solid rgba(167,139,250,0.15); border-radius:24px; padding:32px 24px; display:flex; flex-direction:column; align-items:center; gap:12px; width:100%; max-width:320px; box-shadow:0 20px 40px rgba(0,0,0,0.4); }
    .lobby-title { font-size:1.6rem; font-weight:900; letter-spacing:4px; color:#fff; }
    #selected-room-name { font-size:0.85rem; color:var(--accent-light); font-weight:700; background:rgba(124,58,237,0.1); padding:4px 12px; border-radius:8px; border:1px solid rgba(124,58,237,0.2); }
    .lobby-sub { font-size:0.8rem; color:#888; text-align:center; margin-bottom:4px; }
    #nick-input,#room-pass-input { -webkit-appearance:none; padding:12px 14px; border-radius:12px; border:1px solid rgba(255,255,255,0.08); background:rgba(0,0,0,0.2); color:#fff; font-size:0.95rem; outline:none; width:100%; transition:all 0.2s; }
    #nick-input:focus,#room-pass-input:focus { border-color:var(--accent); background:rgba(0,0,0,0.4); }
    #join-btn { padding:12px; border-radius:12px; border:none; background:var(--accent); color:#fff; font-size:0.95rem; font-weight:600; cursor:pointer; width:100%; box-shadow:0 4px 12px rgba(124,58,237,0.3); transition:all 0.1s; margin-top:4px; }
    #join-btn:active { transform:scale(0.98); }
    #lobby-error { font-size:0.8rem; color:#ef4444; min-height:16px; text-align:center; }

    /* BAĞLANIYOR */
    #connecting-screen { flex:1; display:none; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
    #connecting-screen p { color:#888; font-size:0.9rem; }
    .spinner { width:28px; height:28px; border:3px solid rgba(255,255,255,0.05); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* CHAT & SPOTIFY */
    #chat-screen { display:none; flex:1; flex-direction:column; overflow:hidden; }
    #room-label { text-align:center; font-size:0.75rem; color:#666; padding:6px; background:rgba(0,0,0,0.2); border-bottom:1px solid rgba(255,255,255,0.02); flex-shrink:0; letter-spacing:0.5px; }
    
    #spotify-container { background:rgba(15,15,22,0.95); border-bottom:1px solid rgba(124,58,237,0.2); padding:8px 12px; display:none; flex-direction:column; gap:6px; }
    #spotify-container.active { display:flex; }
    .spot-header { display:flex; justify-content:space-between; align-items:center; font-size:0.75rem; color:#888; }
    .spot-close { background:none; border:none; color:var(--accent-light); cursor:pointer; font-size:0.8rem; font-weight:bold; }
    #spotify-player-frame { border:none; border-radius:8px; background:#000; }

    #messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; overscroll-behavior:contain; }
    .msg { display:flex; flex-direction:column; gap:3px; max-width:75%; position:relative; animation:msgIn 0.2s ease-out; }
    @keyframes msgIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    .msg.mine { align-self:flex-end; align-items:flex-end; }
    .msg.other { align-self:flex-start; align-items:flex-start; }
    .msg-nick { font-size:0.72rem; color:#666; padding:0 4px; }
    .msg.mine .msg-nick { color:var(--accent-light); }
    
    .msg-bubble { padding:10px 14px; border-radius:16px; font-size:0.95rem; line-height:1.45; word-break:break-word; position:relative; }
    .msg.mine .msg-bubble { background:var(--accent); color:#fff; border-bottom-right-radius:2px; box-shadow:0 2px 8px rgba(124,58,237,0.2); }
    .msg.other .msg-bubble { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.03); color:#e0e0e0; border-bottom-left-radius:2px; }
    .msg-time { font-size:0.65rem; color:#555; padding:0 4px; }
    
    .delete-btn { display:none; position:absolute; top:-6px; right:-6px; background:#ef4444; border:none; color:#fff; border-radius:50%; width:18px; height:18px; font-size:0.65rem; cursor:pointer; align-items:center; justify-content:center; z-index:10; }
    .msg.mine:hover .delete-btn { display:flex; }
    .deleted-text { font-style:italic; color:#555 !important; }
    .system-msg { text-align:center; font-size:0.75rem; color:#555; padding:2px 10px; align-self:center; margin:2px 0; background:rgba(255,255,255,0.02); border-radius:8px; }
    
    .msg-img { max-width:200px; max-height:200px; border-radius:10px; cursor:pointer; margin-top:4px; display:block; border:1px solid rgba(255,255,255,0.1); }
    .msg-file-btn { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); padding:8px 12px; border-radius:10px; color:#fff; text-decoration:none; font-size:0.85rem; margin-top:4px; }
    audio { max-width:230px; height:36px; outline:none; margin-top:4px; filter:invert(0.9) hue-rotate(180deg); }

    #typing-status { font-size:0.75rem; color:#555; padding:0 16px 4px 16px; min-height:16px; font-style:italic; }
    #upload-status { display:none; font-size:0.75rem; color:var(--accent-light); padding:0 16px 4px 16px; }

    /* INPUT AREA */
    #input-area { padding:10px 12px; background:rgba(20,20,27,0.9); backdrop-filter:blur(12px); border-top:1px solid rgba(255,255,255,0.05); display:flex; gap:8px; align-items:center; flex-shrink:0; position:relative; }
    #msg-input { flex:1; padding:11px 14px; border-radius:20px; -webkit-appearance:none; border:1px solid rgba(255,255,255,0.08); background:rgba(0,0,0,0.2); color:#fff; font-size:0.95rem; outline:none; transition:all 0.2s; }
    #msg-input:focus { border-color:var(--accent); background:rgba(0,0,0,0.4); }
    
    #send-btn,#mic-btn,#file-btn,#emoji-btn,#spot-share-btn { width:38px; height:38px; border-radius:50%; border:none; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; }
    #send-btn { background:var(--accent); font-size:0.9rem; box-shadow:0 2px 8px rgba(124,58,237,0.3); }
    #mic-btn,#file-btn,#emoji-btn,#spot-share-btn { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); color:#aaa; font-size:1rem; }
    #mic-btn:hover,#file-btn:hover,#emoji-btn:hover { color:#fff; background:rgba(255,255,255,0.08); }
    #spot-share-btn:hover { color:#1DB954; border-color:rgba(29,185,84,0.3); background:rgba(29,185,84,0.05); }
    #mic-btn.recording { background:#ef4444; border-color:#ef4444; animation:blink 0.8s infinite; color:#fff; }
    
    /* EMOJI PANEL */
    #emoji-panel { display:none; position:fixed; bottom:62px; left:12px; right:12px; background:rgba(20,20,27,0.98); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:12px; z-index:50; max-height:180px; overflow-y:auto; box-shadow:0 -5px 20px rgba(0,0,0,0.5); }
    #emoji-panel.open { display:block; }
    #emoji-panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    #emoji-panel-header span { font-size:0.75rem; color:#666; font-weight:700; }
    #emoji-close { background:none; border:none; color:#666; font-size:1rem; cursor:pointer; }
    #emoji-grid { display:flex; flex-wrap:wrap; gap:6px; }
    .emoji-item { font-size:1.3rem; cursor:pointer; padding:3px; border-radius:6px; transition:background 0.1s; user-select:none; }
    .emoji-item:hover { background:rgba(255,255,255,0.08); }

    /* LIGHTBOX */
    #lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:200; align-items:center; justify-content:center; }
    #lightbox.open { display:flex; }
    #lightbox img { max-width:95vw; max-height:95vh; border-radius:8px; }
    #lightbox-close { position:fixed; top:16px; right:16px; background:none; border:none; color:#fff; font-size:1.8rem; cursor:pointer; }

    /* KAPANIŞ EKRANI */
    #closed-screen { display:none; flex:1; flex-direction:column; align-items:center; justify-content:center; padding:32px; text-align:center; gap:16px; }
    #closed-screen.active { display:flex; }
    .closed-card { background:rgba(20,20,27,0.65); backdrop-filter:blur(20px); border:1px solid rgba(167,139,250,0.15); border-radius:24px; padding:32px 24px; display:flex; flex-direction:column; align-items:center; gap:14px; max-width:320px; box-shadow:0 20px 40px rgba(0,0,0,0.4); }
    .closed-heart { font-size:2rem; animation:heartbeat 2.5s infinite; }
    @keyframes heartbeat { 0%,100%{transform:scale(1);opacity:0.5} 50%{transform:scale(1.1);opacity:1} }
    .closed-title { font-size:1.8rem; font-weight:900; letter-spacing:4px; color:#fff; }
    .closed-line { width:32px; height:1px; background:rgba(255,255,255,0.1); }
    .closed-subtitle { font-size:0.85rem; color:#888; line-height:1.6; }
    .closed-date { font-size:0.75rem; color:var(--accent-light); font-weight:600; }

    /* ADMİN PANELİ */
    #admin-screen { display:none; flex:1; flex-direction:column; overflow:hidden; }
    #admin-screen.active { display:flex; }
    #admin-login { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
    #admin-panel { flex:1; display:none; flex-direction:column; overflow:hidden; }
    #admin-panel.active { display:flex; }
    .admin-card { background:rgba(20,20,27,0.85); backdrop-filter:blur(20px); border:1px solid rgba(167,139,250,0.15); border-radius:20px; padding:24px; display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px; box-shadow:0 15px 30px rgba(0,0,0,0.4); }
    .admin-title { font-size:1.2rem; font-weight:800; text-align:center; color:#fff; letter-spacing:1px; }
    .admin-input { padding:11px 14px; border-radius:12px; border:1px solid rgba(255,255,255,0.08); background:rgba(0,0,0,0.2); color:#fff; font-size:0.95rem; outline:none; width:100%; }
    .admin-input:focus { border-color:var(--accent); }
    .admin-btn { padding:11px; border-radius:12px; border:none; background:var(--accent); color:#fff; font-size:0.95rem; font-weight:600; cursor:pointer; width:100%; transition:opacity 0.2s; }
    .admin-btn:active { transform:scale(0.98); }
    #admin-login-error { font-size:0.8rem; color:#ef4444; text-align:center; min-height:16px; }
    
    #admin-panel-inner { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px; overscroll-behavior:contain; }
    .admin-section-title { font-size:0.75rem; color:#666; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    .admin-room-card { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:12px; display:flex; flex-direction:column; gap:8px; }
    .admin-room-header { display:flex; align-items:center; gap:8px; }
    .admin-room-id { font-size:0.7rem; color:#555; background:rgba(0,0,0,0.2); padding:2px 6px; border-radius:4px; }
    .admin-room-online { font-size:0.75rem; color:var(--accent-light); margin-left:auto; font-weight:600; }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="lightbox"><button id="lightbox-close">✕</button><img id="lightbox-img" src="" /></div>

<header>
  <h1 id="logo-title">laviva</h1>
  <div id="header-right">
    <span id="online-count" style="display:none"><span id="status-dot" class="yellow"></span> <span id="online-num">0</span></span>
    <span id="online-list"></span>
    <button id="back-btn" class="hbtn">◀</button>
    <button id="sound-btn" class="hbtn">🔔</button>
    <button id="settings-btn" class="hbtn">⚙️</button>
  </div>
</header>

<div id="settings-panel">
  <div class="sp-label">Vibe Animasyonu</div>
  <div class="anim-row">
    <button class="anim-btn" data-anim="bleeding">🩸 Bleeding</button>
    <button class="anim-btn" data-anim="melancholy">🌫️ Melancholy</button>
    <button class="anim-btn" data-anim="gloom">🌧️ Gloom</button>
    <button class="anim-btn" data-anim="none">✕ Kapalı</button>
  </div>
</div>

<div id="room-select-screen">
  <div class="room-select-card">
    <div class="room-select-title">laviva</div>
    <div class="room-select-sub">bir oda seç</div>
    <div id="rooms-grid"></div>
  </div>
</div>

<div id="lobby-screen">
  <div class="lobby-card">
    <div class="lobby-title">laviva</div>
    <div id="selected-room-name">Oda</div>
    <div class="lobby-sub">nick ve oda şifresini gir</div>
    <input id="nick-input" type="text" placeholder="nick..." maxlength="30" autocomplete="off" />
    <input id="room-pass-input" type="password" placeholder="şifre..." autocomplete="off" />
    <button id="join-btn">Katıl</button>
    <div id="lobby-error"></div>
  </div>
</div>

<div id="connecting-screen"><div class="spinner"></div><p style="margin-top:8px">Bağlanıyor...</p></div>

<div id="chat-screen">
  <div id="room-label"></div>
  
  <div id="spotify-container">
    <div class="spot-header">
      <span>🎵 Birlikte Dinlenen Şarkı</span>
      <button class="spot-close" id="spot-close-btn">✕ Kapat</button>
    </div>
    <iframe id="spotify-player-frame" src="" width="100%" height="80" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </div>

  <div id="messages"></div>
  <div id="typing-status"></div>
  <div id="upload-status">⏳ Medya yükleniyor...</div>
  
  <div id="input-area">
    <button id="file-btn" title="Dosya/Fotoğraf">📎</button>
    <button id="mic-btn" title="Ses Kaydet">🎤</button>
    <button id="emoji-btn" title="Emoji">😀</button>
    <button id="spot-share-btn" title="Spotify Linki">🎵</button>
    <input id="msg-input" type="text" placeholder="Mesaj yaz..." maxlength="500" autocomplete="off" />
    <button id="send-btn">➤</button>
  </div>
  
  <div id="emoji-panel">
    <div id="emoji-panel-header"><span>Hızlı İfadeler</span><button id="emoji-close">✕</button></div>
    <div id="emoji-grid"></div>
  </div>
</div>

<div id="closed-screen">
  <div class="closed-card">
    <div class="closed-heart">🖤</div>
    <div class="closed-title">laviva</div>
    <div class="closed-line"></div>
    <div class="closed-subtitle" id="closed-timer">Zaman durdu.</div>
    <div class="closed-date" id="closed-date-str">31.12.2030</div>
  </div>
</div>
<div id="admin-screen">
  <div id="admin-login">
    <div class="admin-card">
      <div class="admin-title">Yönetici Girişi</div>
      <input id="admin-user-input" class="admin-input" type="text" placeholder="Kullanıcı adı" autocomplete="off"/>
      <input id="admin-pass-input" class="admin-input" type="password" placeholder="Şifre" autocomplete="off"/>
      <button id="admin-login-btn" class="admin-btn">Giriş Yap</button>
      <div id="admin-login-error"></div>
    </div>
  </div>
  <div id="admin-panel">
    <header style="background:rgba(20,20,27,0.95)">
      <h1 style="font-size:1.1rem; letter-spacing:1px">laviva kontrol</h1>
      <button id="admin-logout-btn" class="admin-btn" style="padding:6px 12px; width:auto; margin-left:auto; font-size:0.8rem">Çıkış</button>
    </header>
    <div id="admin-panel-inner">
      <div class="admin-section-title">Yeni Oda Oluştur</div>
      <div class="admin-room-card" style="gap:8px">
        <input id="new-room-name" class="admin-input" style="padding:8px 12px; font-size:0.85rem" type="text" placeholder="Oda Adı" autocomplete="off"/>
        <input id="new-room-pass" class="admin-input" style="padding:8px 12px; font-size:0.85rem" type="password" placeholder="Oda Şifresi" autocomplete="off"/>
        <button id="add-room-btn" class="admin-btn" style="padding:8px; font-size:0.85rem">Odayı Ekle</button>
        <div id="admin-msg" style="font-size:0.8rem; text-align:center; min-height:16px"></div>
      </div>
      <div class="admin-section-title" style="margin-top:8px">Mevcut Odalar</div>
      <div id="admin-rooms-list" style="display:flex; flex-direction:column; gap:8px"></div>
    </div>
  </div>
</div>

<script>
const NICK_KEY       = 'laviva_nick';
const ANIM_KEY       = 'laviva_anim';
const PASS_KEY       = 'laviva_passes';
const SOUND_MUTE_KEY = 'laviva_muted';

let nick           = localStorage.getItem(NICK_KEY) || '';

// ORİJİNAL SOFT BİLDİRİM SESİ (WEB AUDIO API)
function playNotification() {
  if (isMuted) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5 Soft Kasvet Tonu
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
    osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.3);
  } catch(e){}
}

// ── CANVAS VIBE ANIMASYONLARI (KASVET SİSİ & DIĞERLERI) ───────────────────
const canvas = document.getElementById('bg-canvas');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() { W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
resize(); window.addEventListener('resize', resize);

let activeDrops = [], activeClouds = [], activeTears = [];

function initBleeding() {
  activeDrops = Array.from({length:35}, () => ({
    x: Math.random() * W, y: Math.random() * H - H,
    len: Math.random() * 25 + 10, speed: Math.random() * 0.4 + 0.1,
    w: Math.random() * 1.5 + 1, alpha: Math.random() * 0.3 + 0.1
  }));
}
function drawBleeding() {
  animFrame = requestAnimationFrame(drawBleeding);
  ctx.fillStyle = 'rgba(10, 10, 15, 0.08)'; ctx.fillRect(0,0,W,H);
  activeDrops.forEach(d => {
    ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y + d.len);
    ctx.strokeStyle = `rgba(124, 58, 237, ${d.alpha})`; ctx.lineWidth = d.w; ctx.stroke();
    d.y += d.speed; if (d.y > H) { d.y = -d.len; d.x = Math.random() * W; }
  });
}
function initMelancholy() { // KASVET SİSİ RE-DESIGNED
  activeClouds = Array.from({length:12}, () => ({
    x: Math.random() * W, y: Math.random() * H, r: Math.random() * 120 + 80,
    vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2,
    alpha: Math.random() * 0.08 + 0.02, grow: (Math.random() - 0.5) * 0.04
  }));
}
function drawMelancholy() {
  animFrame = requestAnimationFrame(drawMelancholy);
  ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0,0,W,H);
  activeClouds.forEach(c => {
    let grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
    grad.addColorStop(0, `rgba(124, 58, 237, ${c.alpha})`); grad.addColorStop(1, 'rgba(10, 10, 15, 0)');
    ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fillStyle = grad; ctx.fill();
    c.x += c.vx; c.y += c.vy; c.r += c.grow; if(c.r > 240 || c.r < 60) c.grow *= -1;
    if(c.x < -c.r) c.x = W + c.r; if(c.x > W + c.r) c.x = -c.r;
    if(c.y < -c.r) c.y = H + c.r; if(c.y > H + c.r) c.y = -c.r;
  });
}
function initGloom() {
  activeTears = Array.from({length:50}, () => ({
    x: Math.random() * W, y: Math.random() * H,
    length: Math.random() * 12 + 6, speed: Math.random() * 1.2 + 0.4, opacity: Math.random() * 0.15 + 0.03
  }));
}
function drawGloom() {
  animFrame = requestAnimationFrame(drawGloom);
  ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0,0,W,H);
  activeTears.forEach(t => {
    ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.x, t.y + t.length);
    ctx.strokeStyle = `rgba(167, 139, 250, ${t.opacity})`; ctx.stroke();
    t.y += t.speed; if (t.y > H) { t.y = -t.length; t.x = Math.random() * W; }
  });
}
function startAnim(name) {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  ctx.clearRect(0, 0, W, H);
  document.querySelectorAll('.anim-btn').forEach(b => b.classList.toggle('active', b.dataset.anim === name));
  if (name === 'bleeding') { initBleeding(); drawBleeding(); }
  else if (name === 'melancholy') { initMelancholy(); drawMelancholy(); }
  else if (name === 'gloom') { initGloom(); drawGloom(); }
}
startAnim(currentAnim);

document.querySelectorAll('.anim-btn').forEach(btn => {

// ODALARI SUNUCUDAN ÇEKME
async function loadRooms() {
  try {
    const res = await fetch('/rooms'); const rooms = await res.json();
    roomsGrid.innerHTML = '';
    rooms.forEach(r => {
      const btn = document.createElement('button'); btn.className = 'room-btn';
      let html = `<span class="room-name">${r.name}</span>`;
      if (savedPasses[r.id]) html += `<span class="room-saved">Kayıtlı</span>`;
      btn.innerHTML = html;
      btn.addEventListener('click', () => {
        selectedRoomId = r.id; selectedRoomName.textContent = r.name;
        lobbyError.textContent = '';
        if (savedPasses[r.id]) { roomPassInput.value = savedPasses[r.id]; } 
        else { roomPassInput.value = ''; }
        showScreen('lobby');
      });
      roomsGrid.appendChild(btn);
    });
  } catch(e){ roomsGrid.innerHTML='<div style="color:#ef4444; font-size:0.85rem">Odalar çekilemedi.</div>'; }
}

// CHAT MEDYA / DOSYA YÜKLEME SİSTEMİ
fileBtn.addEventListener('click', () => hiddenFileInput.click());
hiddenFileInput.addEventListener('change', async () => {
  const file = hiddenFileInput.files[0]; if(!file) return;
  if(file.size > 25 * 1024 * 1024) { alert("Maksimum dosya boyutu 25MB'dır."); return; }
  
  const reader = new FileReader();
  reader.onloadstart = () => uploadStatus.style.display='block';
  reader.onload = async (e) => {
    try {
      let route = '/upload-file'; 
      let payload = { file: e.target.result, nick, roomId: selectedRoomId, fileName: file.name, fileType: file.type };
      if(file.type.startsWith('audio/')) { route = '/upload-audio'; payload = { audio: e.target.result, nick, roomId: selectedRoomId }; }
      
      const res = await fetch(route, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
      const d = await res.json(); if(!d.ok) alert("Yükleme başarısız oldu.");
    } catch(err) { alert("Dosya gönderme hatası."); } finally { uploadStatus.style.display='none'; hiddenFileInput.value=''; }
  };
  reader.readAsDataURL(file);
});
  // SES KAYDETME (MİKROFON) SİSTEMİ
let mediaRecorder = null; let audioChunks = [];
micBtn.addEventListener('click', async () => {
  if (mediaRecorder && mediaRecorder.state === "recording") { mediaRecorder.stop(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream); audioChunks = [];
    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      uploadStatus.style.display='block';
      const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
      const r = new FileReader();
      r.onloadend = async () => {
        try {
          await fetch('/upload-audio', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ audio: r.result, nick, roomId: selectedRoomId })});
        } catch(e){} finally { uploadStatus.style.display='none'; }
      };
      r.readAsDataURL(audioBlob);
      stream.getTracks().forEach(t => t.stop()); micBtn.classList.remove('recording');
    };
    mediaRecorder.start(); micBtn.classList.add('recording');
  } catch(e) { alert("Mikrofon izni alınamadı veya cihaz bulunamadı."); }
});

// CHAT MESAJ BALONCUKLARINI YAZDIRMA
function appendMessage(m) {
  const isMine = m.nick === nick;
  const div = document.createElement('div');
  div.className = `msg ${isMine ? 'mine' : 'other'}`;
  div.dataset.id = m.id;
  
  let timeStr = '';
  try { timeStr = new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); } catch(e){}
  
  let content = '';
  if (m.deleted) {
    content = `<span class="deleted-text">fısıltı silindi...</span>`;
  } else if (m.audioUrl) {
    content = `<audio src="${m.audioUrl}" controls></audio>`;
  } else if (m.fileUrl) {
    if (m.fileType && m.fileType.startsWith('image/')) {
      content = `<img class="msg-img" src="${m.fileUrl}" onclick="openLightbox('${m.fileUrl}')" />`;
    } else {
      content = `<a class="msg-file-btn" href="${m.fileUrl}" download="${m.fileName || 'dosya'}">📁 ${m.fileName || 'Dosya indir'}</a>`;
    }
  } else {
    content = m.text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  div.innerHTML = `
    <span class="msg-nick">${m.nick}</span>
    <div class="msg-bubble">
      ${isMine && !m.deleted ? `<button class="delete-btn" onclick="deleteMsg('${m.id}')">✕</button>` : ''}
      ${content}
    </div>
    <span class="msg-time">${timeStr}</span>
  `;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function deleteMsg(id) { if (ws && ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify({type:'delete', id, nick})); } }

// WEBSOCKET BAĞLANTISI VE GELEN VERİ AKIŞI
function connectChat(roomId, password) {
  showScreen('connecting'); statusDot.className = 'yellow';
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  
  ws = new WebSocket(`${proto}://${location.host}`);
  
  ws.onopen = () => {
    statusDot.className = 'green';
    ws.send(JSON.stringify({type:'join', roomId, nick, password}));
  };
  
  ws.onmessage = (e) => {
    let d; try { d = JSON.parse(e.data); } catch(err){return;}
    
    if (d.type === 'error') { alert(d.text); ws.close(); showScreen('lobby'); }
    else if (d.type === 'shutdown') { startShutdownTimer(d.shutdownTime); }
    else if (d.type === 'history') {
      savedPasses[roomId] = password; localStorage.setItem(PASS_KEY, JSON.stringify(savedPasses));
      document.getElementById('room-label').textContent = selectedRoomName.textContent;
      messagesEl.innerHTML = '';
      d.messages.forEach(appendMessage);
      showScreen('chat'); loadRooms();
    }
    else if (d.type === 'message') { appendMessage(d.message); playNotification(); }
    else if (d.type === 'deleted') {
      const el = messagesEl.querySelector(`[data-id="${d.id}"]`);
      if(el) {
        const bubble = el.querySelector('.msg-bubble');
        if(bubble) bubble.innerHTML = `<span class="deleted-text">fısıltı silindi...</span>`;
        const delBtn = el.querySelector('.delete-btn'); if(delBtn) delBtn.remove();
      }
    }
    else if (d.type === 'system') {
      const div = document.createElement('div'); div.className='system-msg'; div.textContent=d.text;
      messagesEl.appendChild(div); messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    else if (d.type === 'online') {
      onlineNumEl.textContent = d.count;
      onlineListEl.textContent = d.users ? d.users.join(', ') : '';
    }
    else if (d.type === 'typing') {
      typingStatus.textContent = `${d.nick} yazıyor...`;
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => typingStatus.textContent='', 1500);
    }
    else if (d.type === 'spotify-broadcast') {
      spotifyFrame.src = d.url;
      spotifyContainer.classList.add('active');
    }
  };
  
  ws.onclose = () => { statusDot.className = 'red'; };
}

// SAYAÇ / KAPANIŞ EKRANI ZAMANLAYICISI
let shutdownInterval = null;
function startShutdownTimer(targetTime) {
  if(shutdownInterval) clearInterval(shutdownInterval);
  const timerEl = document.getElementById('closed-timer');
  const dStrEl = document.getElementById('closed-date-str');
  try { dStrEl.textContent = new Date(targetTime).toLocaleDateString('tr-TR'); }catch(e){}
  
  function update() {
    const diff = targetTime - Date.now();
    if (diff <= 0) { clearInterval(shutdownInterval); showScreen('closed'); if(ws){ws.close();} return; }
    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff / (1000*60*60)) % 24);
    const mins = Math.floor((diff / (1000*60)) % 60);
    const secs = Math.floor((diff / 1000) % 60);
    timerEl.textContent = `${days}g ${hours}s ${mins}d ${secs}s kaldı`;
  }
  update(); shutdownInterval = setInterval(update, 1000);
}

async function loadAdminRooms() {
  const list = document.getElementById('admin-rooms-list'); list.innerHTML = 'Yükleniyor...';
  try {
    const res = await fetch('/admin/rooms', { headers:{'x-admin-token':adminToken} });
    const data = await res.json(); list.innerHTML = '';
    data.forEach(r => {
      const card = document.createElement('div'); card.className = 'admin-room-card';
      card.innerHTML = `
        <div class="admin-room-header">
          <strong>${r.name}</strong> <span class="admin-room-id">${r.id}</span>
          <span class="admin-room-online">👥 ${r.online}</span>
        </div>
        <div style="font-size:0.8rem; color:#666">Şifre: ${r.password || 'Yok'}</div>
        <div style="display:flex; gap:6px; margin-top:4px">
          <button class="admin-btn" style="padding:6px; font-size:0.75rem; background:#2e1065" onclick="clearRoomMsgs('${r.id}')">Mesajları Temizle</button>
          <button class="admin-btn" style="padding:6px; font-size:0.75rem; background:#dc2626" onclick="deleteRoom('${r.id}')">Odayı Sil</button>
        </div>
      `;
