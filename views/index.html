<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aero°</title>
<link rel="stylesheet" href="/public/css/style.css">
</head>
<body>

<div class="app">
  <header class="hero">
    <h1>Aero°</h1>
    <p>şarkılar, anılar ve iyi hissettirecek birkaç söz</p>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="playlists">çalma listeleri</button>
    <button class="tab-btn" data-tab="memories">anılar</button>
    <button class="tab-btn" data-tab="bot">bugün</button>
  </nav>

  <section id="playlists" class="panel active">
    <div id="playlists-list"></div>
  </section>

  <section id="memories" class="panel">
    <div id="memories-list"></div>
  </section>

  <section id="bot" class="panel">
    <div class="card bot-box">
      <div class="bot-message" id="botMessage">bir şeyler düşünüyor...</div>
      <button id="botRefresh">yeni bir söz</button>
    </div>
  </section>

  <footer class="logout">
    <a href="/admin">admin paneli</a>
    <span class="dot">·</span>
    <a href="/logout">çıkış yap</a>
  </footer>
</div>

<script src="/public/js/particles.js"></script>
<script src="/public/js/main.js"></script>
</body>
</html>
